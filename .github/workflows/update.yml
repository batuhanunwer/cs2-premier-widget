name: Update CS2 Widget

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get profile
        run: |
          curl -H "Authorization: Bearer ${{ secrets.LEETIFY_API_KEY }}" \
          "https://api-public.cs-prod.leetify.com/v3/profile?steam64_id=76561198815291086" \
          -o data.json

      - name: Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update data"
          git push
